<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen Video</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial,sans-serif;
}

video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    background:#000;
}

#start{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    z-index:9999;
}

#start button{
    padding:18px 60px;
    font-size:24px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#loading{
    position:fixed;
    inset:0;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#000;
    color:#fff;
    z-index:9998;
}

.spinner{
    width:70px;
    height:70px;
    border:7px solid rgba(255,255,255,.2);
    border-top:7px solid #fff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

#loading p{
    margin-top:20px;
    font-size:18px;
}
</style>

</head>
<body>

<div id="start">
    <button id="openBtn">Buka</button>
</div>

<div id="loading">
    <div class="spinner"></div>
    <p>Loading...</p>
</div>

<video id="video" playsinline preload="none">
    <!-- Ganti video.mp4 dengan nama video Anda -->
    <source src="video.mp4" type="video/mp4">
</video>

<script>

const btn=document.getElementById("openBtn");
const start=document.getElementById("start");
const loading=document.getElementById("loading");
const video=document.getElementById("video");

btn.onclick=function(){

    start.style.display="none";
    loading.style.display="flex";

    video.muted=false;
    video.volume=1;

    // Mulai download video
    video.load();

    let timerDone=false;
    let videoReady=false;

    // Loading minimal 5 detik
    setTimeout(function(){
        timerDone=true;
        cek();
    },5000);

    // Tunggu video selesai buffer
    video.addEventListener("canplaythrough",function(){
        videoReady=true;
        cek();
    },{once:true});

    function cek(){

        if(!(timerDone && videoReady))
            return;

        loading.style.display="none";

        // Fullscreen
        if(video.requestFullscreen){
            video.requestFullscreen();
        }else if(video.webkitRequestFullscreen){
            video.webkitRequestFullscreen();
        }else if(video.msRequestFullscreen){
            video.msRequestFullscreen();
        }

        // Putar video dengan audio
        video.play().catch(function(e){
            console.log(e);
        });

    }

};

</script>

</body>
</html>
